name: erd_rezzer
description: FrostParts — Flutter Windows ERP for ERB-Frezzer API
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  esc_pos_utils_plus: ^2.0.4
  image: ^4.5.4
  logging: ^1.3.0
  dio: ^5.7.0
  connectivity_plus: ^6.0.0
  drift: ^2.22.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.5
  path: ^1.9.0
  flutter_secure_storage: ^9.2.0
  shared_preferences: ^2.3.3
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7
  go_router: ^14.0.0
  uuid: ^4.5.0
  intl: ^0.20.2
  fl_chart: ^0.69.0
  data_table_2: ^2.5.0
  file_picker: ^8.1.7
  cached_network_image: ^3.4.1
  printing: ^5.13.0
  get_it: ^8.0.2
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.22.0
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  image_path: assets/updates.png
  android: true
  ios: true
  web:
    generate: true
    image_path: assets/updates.png
    background_color: "#000000"
    theme_color: "#1A237E"
  windows:
    generate: true
    image_path: assets/updates.png
    icon_size: 256
  macos:
    generate: true
    image_path: assets/updates.png

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/updates.png
